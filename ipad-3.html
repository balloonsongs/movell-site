<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 1366px; zoom: 2;
    background: linear-gradient(160deg, #dde6dd 0%, #f0ede6 55%);
    display: flex; flex-direction: column; align-items: center;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    padding: 60px 40px 40px; overflow: hidden;
  }
  .top-text { text-align: center; margin-bottom: 40px; }
  .top-title { font-size: 46px; font-weight: 700; color: #3a3a3a; line-height: 1.35; margin-bottom: 14px; }
  .top-sub { font-size: 20px; color: #7a7a7a; line-height: 1.6; }
  .ipad-mockup {
    width: 700px; background: #1a1f2e; border-radius: 40px;
    padding: 14px; box-shadow: 0 40px 80px rgba(0,0,0,0.28); position: relative;
  }
  .ipad-mockup::before {
    content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 8px; background: #2a2f3e; border-radius: 4px; z-index: 10;
  }
  .ipad-screen {
    border-radius: 28px; overflow: hidden; background: #f5f2eb;
    display: flex; flex-direction: column; padding: 32px 28px 20px;
    aspect-ratio: 3/4;
  }
  .status-bar { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #3a3a3a; margin-bottom: 12px; }
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .nav-back { font-size: 20px; color: #3a3a3a; }
  .nav-dots { display: flex; gap: 4px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 3px; background: #ccc; }
  .dot.active { width: 14px; background: #3D5A45; }
  .nav-icons { display: flex; gap: 12px; font-size: 16px; color: #7a7a7a; }
  .char-row { margin-bottom: 6px; }
  .char-small { width: 32px; height: 32px; opacity: 0.8; }
  .progress-bar { height: 3px; background: #e0ddd6; border-radius: 2px; margin-bottom: 14px; position: relative; }
  .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 35%; background: #3D5A45; border-radius: 2px; }
  .step-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .step-title { font-size: 20px; font-weight: 700; color: #3a3a3a; }
  .step-sub { font-size: 11px; color: #7a7a7a; }
  .auto-save { font-size: 10px; color: #3D5A45; }
  .reform-card { background: #f0f5f0; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .reform-icon { font-size: 20px; color: #3D5A45; margin-right: 10px; }
  .reform-text { flex: 1; }
  .reform-title { font-size: 12px; font-weight: 600; color: #3a3a3a; }
  .reform-sub { font-size: 10px; color: #7a7a7a; margin-top: 2px; }
  .reform-arrow { font-size: 14px; color: #aaa; }
  .card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .card-header { font-size: 11px; color: #7a7a7a; text-align: center; margin-bottom: 10px; }
  .option-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .opt-unsel { border: 1px solid #e0ddd6; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #7a7a7a; }
  .opt-sel { background: #3D5A45; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #fff; font-weight: 600; }
  .card2-header { font-size: 11px; color: #7a7a7a; text-align: center; margin-bottom: 10px; }
  .select-btn { background: #3D5A45; color: #fff; border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
  .next-btn { background: #3D5A45; color: #fff; border-radius: 14px; padding: 14px; text-align: center; font-size: 16px; font-weight: 600; margin-top: auto; }
  .tab-bar { display: flex; justify-content: space-around; padding-top: 12px; margin-top: 12px; border-top: 1px solid #e0ddd6; }
  .tab { font-size: 9px; color: #aaa; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .tab.active { color: #3D5A45; }
  .tab-icon { font-size: 16px; }
</style>
</head>
<body>
  <div class="top-text">
    <div class="top-title">2026年法改正にも、<br>対応しています。</div>
    <div class="top-sub">共同親権、養育費のことなど<br>変わった制度を確認しながら整理できます。</div>
  </div>
  <div class="ipad-mockup">
    <div class="ipad-screen">
      <div class="status-bar"><span>12:15</span><span>WiFi 🔋</span></div>
      <div class="nav-bar">
        <div class="nav-back">‹</div>
        <div class="nav-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot active"></div>
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="nav-icons"><span>☕</span><span>❓</span><span>⚙</span></div>
      </div>
      <div class="char-row"><img src="images/Charactor.png" class="char-small"></div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <div class="step-row">
        <div>
          <div class="step-title">STEP 3　親権</div>
          <div class="step-sub">親権についての状況を整理します。</div>
        </div>
        <div class="auto-save">✓ 自動保存済み</div>
      </div>
      <div class="reform-card">
        <div class="reform-icon">👥</div>
        <div class="reform-text">
          <div class="reform-title">2026年4月から変わること（共同親権）</div>
          <div class="reform-sub">離婚後の親権の選択肢が変わりました</div>
        </div>
        <div class="reform-arrow">›</div>
      </div>
      <div class="card">
        <div class="card-header">親権についての現在の状況</div>
        <div class="option-row">
          <div class="opt-unsel">合意済み</div>
          <div class="opt-sel">協議中</div>
          <div class="opt-unsel">未定</div>
        </div>
      </div>
      <div class="card">
        <div class="card2-header">主に子どもと暮らす予定</div>
        <div class="select-btn">山田花子</div>
      </div>
      <div class="next-btn">→ 次へ</div>
      <div class="tab-bar">
        <div class="tab active"><div class="tab-icon">✓</div>整理</div>
        <div class="tab"><div class="tab-icon">◫</div>まとめ</div>
        <div class="tab"><div class="tab-icon">📋</div>知識</div>
      </div>
    </div>
  </div>
</body>
</html>
