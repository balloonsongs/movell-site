<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 1366px; zoom: 2;
    background: linear-gradient(160deg, #dde6dd 0%, #f0ede6 55%);
    display: flex; flex-direction: column; align-items: center;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    padding: 60px 40px 40px; overflow: hidden;
  }
  .top-text { text-align: center; margin-bottom: 40px; }
  .top-title { font-size: 46px; font-weight: 700; color: #3a3a3a; line-height: 1.35; margin-bottom: 14px; }
  .top-sub { font-size: 20px; color: #7a7a7a; line-height: 1.6; }
  .ipad-mockup {
    width: 700px; background: #1a1f2e; border-radius: 40px;
    padding: 14px; box-shadow: 0 40px 80px rgba(0,0,0,0.28); position: relative;
  }
  .ipad-mockup::before {
    content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 8px; background: #2a2f3e; border-radius: 4px; z-index: 10;
  }
  .ipad-screen {
    border-radius: 28px; overflow: hidden; background: #f5f2eb;
    display: flex; flex-direction: column; padding: 32px 28px 16px;
    aspect-ratio: 3/4;
  }
  .status-bar { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #3a3a3a; margin-bottom: 14px; }
  .page-title { font-size: 26px; font-weight: 700; color: #3a3a3a; margin-bottom: 14px; }
  .intro-card { background: #fff; border-radius: 14px; padding: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; position: relative; }
  .intro-badge { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: #3D5A45; color: #fff; font-size: 9px; font-weight: 600; padding: 3px 10px; border-radius: 10px; white-space: nowrap; }
  .intro-char { width: 44px; height: 44px; }
  .intro-text { flex: 1; }
  .intro-title { font-size: 14px; font-weight: 700; color: #3a3a3a; line-height: 1.3; }
  .intro-sub { font-size: 10px; color: #7a7a7a; margin-top: 4px; line-height: 1.5; }
  .intro-arrow { font-size: 14px; color: #aaa; }
  .section-label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; margin-top: 4px; }
  .section-bar { width: 3px; height: 14px; background: #3D5A45; border-radius: 2px; }
  .section-name { font-size: 11px; font-weight: 600; color: #3a3a3a; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .k-card { background: #fff; border-radius: 12px; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
  .k-badge { position: absolute; top: -6px; right: 8px; background: #3D5A45; color: #fff; font-size: 8px; font-weight: 600; padding: 2px 7px; border-radius: 8px; }
  .k-icon { font-size: 18px; color: #3D5A45; }
  .k-name { font-size: 12px; font-weight: 600; color: #3a3a3a; text-align: center; }
  .k-sub { font-size: 9px; color: #7a7a7a; text-align: center; }
  .k-card-wide { background: #fff; border-radius: 12px; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
  .tab-bar { display: flex; justify-content: space-around; padding-top: 12px; margin-top: auto; border-top: 1px solid #e0ddd6; }
  .tab { font-size: 9px; color: #aaa; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .tab.active { color: #3D5A45; }
  .tab-icon { font-size: 16px; }
</style>
</head>
<body>
  <div class="top-text">
    <div class="top-title">迷ったら、<br>調べながら整理できる。</div>
    <div class="top-sub">公的出典付きの知識タブ付き<br>法改正の情報もここで確認できます</div>
  </div>
  <div class="ipad-mockup">
    <div class="ipad-screen">
      <div class="status-bar"><span>14:10</span><span>WiFi 🔋</span></div>
      <div class="page-title">知識</div>
      <div class="intro-card">
        <div class="intro-badge">まずここから</div>
        <img src="images/Charactor.png" class="intro-char">
        <div class="intro-text">
          <div class="intro-title">離婚に関する<br>基礎知識</div>
          <div class="intro-sub">法改正の内容や手続きの流れを<br>確認できます</div>
        </div>
        <div class="intro-arrow">›</div>
      </div>
      <div class="section-label">
        <div class="section-bar"></div>
        <div class="section-name">2026年改正</div>
      </div>
      <div class="grid-2">
        <div class="k-card">
          <div class="k-badge">2026年4月</div>
          <div class="k-icon">👥</div>
          <div class="k-name">親権</div>
          <div class="k-sub">共同親権・単独親権</div>
        </div>
        <div class="k-card">
          <div class="k-badge">2026年4月</div>
          <div class="k-icon">👥</div>
          <div class="k-name">面会交流</div>
          <div class="k-sub">引き渡し・支援機関</div>
        </div>
        <div class="k-card">
          <div class="k-badge">2026年4月</div>
          <div class="k-icon">📄</div>
          <div class="k-name">養育費の<br>取り決め</div>
          <div class="k-sub">法定養育費・算定表</div>
        </div>
        <div class="k-card">
          <div class="k-badge">2026年4月</div>
          <div class="k-icon">📋</div>
          <div class="k-name">書面化・<br>公正証書</div>
          <div class="k-sub">先取特権・強制執行</div>
        </div>
      </div>
      <div class="k-card-wide" style="margin-bottom:10px;">
        <div class="k-badge">2026年4月</div>
        <div class="k-icon">⚖️</div>
        <div class="k-name">財産分与</div>
        <div class="k-sub">財産の分け方・年金分割</div>
      </div>
      <div class="section-label">
        <div class="section-bar"></div>
        <div class="section-name">相談・手続き</div>
      </div>
      <div class="tab-bar">
        <div class="tab"><div class="tab-icon">✓</div>整理</div>
        <div class="tab"><div class="tab-icon">◫</div>まとめ</div>
        <div class="tab active"><div class="tab-icon">📋</div>知識</div>
      </div>
    </div>
  </div>
</body>
</html>
