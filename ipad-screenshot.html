<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 1366px;
    zoom: 2;
    background: linear-gradient(160deg, #dde6dd 0%, #f0ede6 55%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    padding: 60px 40px 40px;
    overflow: hidden;
  }

  .top-text {
    text-align: center;
    margin-bottom: 40px;
  }
  .top-title {
    font-size: 48px;
    font-weight: 700;
    color: #3a3a3a;
    line-height: 1.35;
    margin-bottom: 14px;
  }
  .top-sub {
    font-size: 22px;
    color: #7a7a7a;
    font-weight: 400;
  }

  .ipad-mockup {
    width: 680px;
    background: #1a1f2e;
    border-radius: 40px;
    padding: 14px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.28);
    position: relative;
  }
  /* top sensor bar */
  .ipad-mockup::before {
    content: '';
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 8px;
    background: #2a2f3e;
    border-radius: 4px;
    z-index: 10;
  }

  .ipad-screen {
    border-radius: 28px;
    overflow: hidden;
    background: #f5f2eb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 56px 40px;
    gap: 24px;
    aspect-ratio: 3/4;
  }

  .status-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
    color: #3a3a3a;
    margin-bottom: -8px;
  }
  .status-right { display: flex; gap: 6px; align-items: center; }
  .wifi-icon { font-size: 12px; }

  .char-img {
    width: 160px;
    height: auto;
  }

  .main-title {
    font-size: 34px;
    font-weight: 700;
    color: #3a3a3a;
    text-align: center;
    line-height: 1.3;
  }

  .sub-text {
    font-size: 16px;
    color: #7a7a7a;
    text-align: center;
    line-height: 1.75;
    margin-top: -8px;
  }

  .btn {
    background: #3D5A45;
    color: white;
    border-radius: 14px;
    padding: 18px 0;
    width: 100%;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    margin-top: 8px;
  }

  .disclaimer {
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>
  <div class="top-text">
    <div class="top-title">頭の中が<br>散らかっていても、<br>大丈夫。</div>
    <div class="top-sub">離婚の条件を、ひとつずつ整理するノート</div>
  </div>

  <div class="ipad-mockup">
    <div class="ipad-screen">
      <div class="status-bar">
        <span>12:15</span>
        <div class="status-right">
          <span class="wifi-icon">▪▪▪</span>
          <span>WiFi</span>
          <span>🔋</span>
        </div>
      </div>
      <img src="images/Charactor.png" class="char-img" alt="">
      <div class="main-title">ひとつずつ、整理しよう。</div>
      <div class="sub-text">離婚の条件を、ひとつずつ<br>整理するためのノートです。</div>
      <div class="btn">はじめる</div>
      <div class="disclaimer">🗒 免責事項を確認する</div>
    </div>
  </div>
</body>
</html>
