<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 1366px; zoom: 2;
    background: linear-gradient(160deg, #dde6dd 0%, #f0ede6 55%);
    display: flex; flex-direction: column; align-items: center;
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    padding: 60px 40px 40px; overflow: hidden;
  }
  .top-text { text-align: center; margin-bottom: 40px; }
  .top-title { font-size: 46px; font-weight: 700; color: #3a3a3a; line-height: 1.35; margin-bottom: 14px; }
  .top-sub { font-size: 20px; color: #7a7a7a; line-height: 1.6; }
  .ipad-mockup {
    width: 700px; background: #1a1f2e; border-radius: 40px;
    padding: 14px; box-shadow: 0 40px 80px rgba(0,0,0,0.28); position: relative;
  }
  .ipad-mockup::before {
    content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 8px; background: #2a2f3e; border-radius: 4px; z-index: 10;
  }
  .ipad-screen {
    border-radius: 28px; overflow: hidden; background: #f5f2eb;
    display: flex; flex-direction: column; padding: 32px 28px 16px;
    aspect-ratio: 3/4;
  }
  .status-bar { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: #3a3a3a; margin-bottom: 14px; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .page-title { font-size: 26px; font-weight: 700; color: #3a3a3a; }
  .page-sub { font-size: 11px; color: #7a7a7a; margin-bottom: 14px; }
  .summary-card { background: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .sc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .sc-title { font-size: 11px; font-weight: 700; color: #3a3a3a; }
  .sc-edit { font-size: 11px; color: #3D5A45; font-weight: 500; }
  .sc-badge { font-size: 9px; color: #e07050; background: #fff3ef; border: 1px solid #f0c0b0; border-radius: 8px; padding: 2px 8px; }
  .sc-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0ede6; }
  .sc-row:last-child { border-bottom: none; }
  .sc-label { font-size: 11px; color: #7a7a7a; }
  .sc-value { font-size: 11px; color: #3a3a3a; font-weight: 500; }
  .sc-value.muted { color: #aaa; }
  .export-btn { background: #3D5A45; color: #fff; border-radius: 14px; padding: 14px; text-align: center; font-size: 14px; font-weight: 600; margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .tab-bar { display: flex; justify-content: space-around; padding-top: 12px; margin-top: 12px; border-top: 1px solid #e0ddd6; }
  .tab { font-size: 9px; color: #aaa; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .tab.active { color: #3D5A45; }
  .tab-icon { font-size: 16px; }
</style>
</head>
<body>
  <div class="top-text">
    <div class="top-title">整理したことが、<br>一枚にまとまる。</div>
    <div class="top-sub">話し合いの前に見返せる<br>ノートとして書き出すこともできます</div>
  </div>
  <div class="ipad-mockup">
    <div class="ipad-screen">
      <div class="status-bar"><span>12:15</span><span>WiFi 🔋</span></div>
      <div class="page-header">
        <div class="page-title">まとめ</div>
        <span style="font-size:16px;color:#7a7a7a;">⚙</span>
      </div>
      <div class="page-sub">変更したい項目は編集をタップしてください。</div>
      <div class="summary-card">
        <div class="sc-header">
          <div class="sc-title">STEP 1　あなたの状況</div>
          <div class="sc-edit">編集</div>
        </div>
        <div class="sc-row"><span class="sc-label">居住状況</span><span class="sc-value">別居している</span></div>
        <div class="sc-row"><span class="sc-label">婚姻費用分担</span><span class="sc-value muted">未定</span></div>
        <div class="sc-row"><span class="sc-label">話し合い</span><span class="sc-value muted">未定</span></div>
        <div class="sc-row"><span class="sc-label">あなた</span><span class="sc-value">山田花子</span></div>
        <div class="sc-row"><span class="sc-label">相手</span><span class="sc-value">山田太郎</span></div>
      </div>
      <div class="summary-card">
        <div class="sc-header">
          <div class="sc-title">STEP 2　子どもの状況</div>
          <div class="sc-edit">編集</div>
        </div>
        <div class="sc-row"><span class="sc-label">人数</span><span class="sc-value">1人</span></div>
        <div class="sc-row"><span class="sc-label">山田　凪</span><span class="sc-value">山田花子</span></div>
      </div>
      <div class="summary-card">
        <div class="sc-header">
          <div class="sc-title">STEP 3　親権</div>
          <div style="display:flex;gap:8px;align-items:center;"><div class="sc-badge">協議中</div><div class="sc-edit">編集</div></div>
        </div>
        <div class="sc-row"><span class="sc-label">親権</span><span class="sc-value muted">未定</span></div>
        <div class="sc-row"><span class="sc-label">主に暮らす</span><span class="sc-value">山田花子</span></div>
      </div>
      <div class="export-btn">📋 まとめをノートとして書き出す</div>
      <div class="tab-bar">
        <div class="tab"><div class="tab-icon">✓</div>整理</div>
        <div class="tab active"><div class="tab-icon">◫</div>まとめ</div>
        <div class="tab"><div class="tab-icon">📋</div>知識</div>
      </div>
    </div>
  </div>
</body>
</html>
